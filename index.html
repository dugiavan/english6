<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="page-title">Ancient Tales</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">
    <style>
        /* GIỮ NGUYÊN TOÀN BỘ CSS CỦA BẠN */
        :root {
            --text-dark: #2c3e50;
            --accent-gold: #f1c40f;
            --royal-purple: #4a148c;
            --drop-shadow: 0 15px 45px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Comfortaa', sans-serif;
            background: linear-gradient(-45deg, #4a148c, #880e4f, #1a1a2e);
            background-attachment: fixed;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .header {
            text-align: center;
            padding: 15px 10px;
            z-index: 10;
            flex-shrink: 0;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.8rem, 6vw, 3rem);
            margin: 0;
            color: var(--accent-gold);
        }

        .author-tag {
            font-size: 0.75rem;
            color: var(--accent-gold);
            opacity: 0.9;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .story-title-vn {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 2px;
        }

        #story-selector,
        #voice-select {
            margin-top: 8px;
            /* 1. Nền cực mỏng để nhìn xuyên thấu nhưng vẫn nổi chữ */
            background: rgba(255, 255, 255, 0.05);
            /* 2. Viền vàng mảnh sang trọng */
            border: 1px solid rgba(241, 196, 15, 0.4);
            color: var(--accent-gold);
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            width: 90%;
            max-width: 320px;

            /* 3. Xử lý hiển thị */
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            outline: none;
            cursor: pointer;
            text-align: center;

            /* 4. Hiệu ứng kính làm nền sao mờ ảo phía sau */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);

            /* 5. Thêm mũi tên nhỏ bên phải để người dùng biết là menu */
            background-image: linear-gradient(45deg, transparent 50%, var(--accent-gold) 50%),
                linear-gradient(135deg, var(--accent-gold) 50%, transparent 50%);
            background-position: calc(100% - 20px) calc(1em + 2px),
                calc(100% - 15px) calc(1em + 2px);
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
        }

        /* Quan trọng: Sửa màu cho các dòng Option bên trong */
        #story-selector option,
        #voice-select option {
            /* Trình duyệt không cho phép option trong suốt hoàn toàn, 
       nên ta dùng màu tối nhất của background để giả lập trong suốt */
            background-color: #1a1a2e;
            color: white;
            padding: 10px;
        }

        /* Hiệu ứng khi nhấn vào */
        #story-selector:focus,
        #voice-select:focus {
            border-color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.1);
        }

        .gallery-wrapper {
            flex: 1;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            display: flex;
            align-items: center;
            overflow: visible;
        }

        .gallery-container {
            display: flex;
            align-items: center;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            width: 100%;
            height: 100%;
            scrollbar-width: none;
            cursor: grab;
        }

        .gallery-container::-webkit-scrollbar {
            display: none;
        }

        .snap-spacer {
            flex: 0 0 calc(50% - 150px);
        }

        .flashcard {
            flex: 0 0 300px;
            height: 450px;
            margin: 0 30px;
            perspective: 1000px;
            scroll-snap-align: center;
            scroll-snap-stop: always;
            transition: all 0.6s ease;
            opacity: 0.2;
            transform: scale(0.8);
            filter: blur(4px);
        }

        .flashcard.active {
            opacity: 1;
            transform: scale(1.05);
            filter: blur(0);
            z-index: 5;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .flashcard.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 35px;
            border-radius: 30px;
            background: #ffffff;
            border: 4px solid var(--accent-gold);
            color: var(--text-dark);
            text-align: center;
        }

        .card-back {
            transform: rotateY(180deg);
            background: #fdfdf5;
        }

        .type-tag {
            position: absolute;
            top: 25px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #fff;
            background: var(--royal-purple);
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .english {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a237e;
        }

        .vietnamese {
            font-size: 1.1rem;
            color: #3e2723;
            font-style: italic;
        }

        .audio-icon {
            margin-top: 30px;
            background: var(--accent-gold);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .audio-icon svg {
            width: 22px;
            fill: var(--royal-purple);
        }

        .footer-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 15px 0;
            z-index: 100;
            flex-shrink: 0;
        }

        .nav-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(241, 196, 15, 0.15);
            border: 1.5px solid var(--accent-gold);
            color: var(--accent-gold);
            cursor: pointer;
        }

        .counter {
            background: rgba(241, 196, 15, 0.2);
            border: 1px solid var(--accent-gold);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--accent-gold);
            font-weight: 700;
            min-width: 80px;
            text-align: center;
        }

        .footer-hint {
            font-size: 0.7rem;
            text-align: center;
            opacity: 0.6;
            padding-bottom: 15px;
        }
    </style>
</head>

<body>

    <div class="header">

            },
            weatherUnit: {
                titleEn: "Unit: Weather and Clothing",
                titleVi: "Bài: Thời tiết và Trang phục",
                data: [
                    // --- ĐOẠN HỘI THOẠI VỀ THỜI TIẾT ---
                    {

                        vi: "Chào Minh, thời tiết hôm nay thế nào nhỉ?",
                        scene: "Weather Today"

                    {

                    }
                ]
            }
        };

        const synth = window.speechSynthesis;
        const voiceSelect = document.getElementById('voice-select');
        let voices = [];
        let currentStoryData = [];

        function loadVoices() {
            voices = synth.getVoices().filter(v => v.lang.includes('en'));
            voiceSelect.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
        }
        synth.onvoiceschanged = loadVoices;

        function speak(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (voices[voiceSelect.value]) utterance.voice = voices[voiceSelect.value];
            synth.speak(utterance);
        }

        // HÀM QUAN TRỌNG: LOAD TRUYỆN THEO LỰA CHỌN
        function loadStory(storyKey) {
            const story = allStories[storyKey];
            if (!story) return;

            document.getElementById('main-title').innerText = story.titleEn;
            document.getElementById('sub-title').innerText = story.titleVi;

            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<div class="snap-spacer"></div><div class="snap-spacer"></div>';
            const spacerAfter = gallery.querySelector('.snap-spacer:last-child');

            currentStoryData = story.data;

            currentStoryData.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'flashcard';
                card.dataset.index = i;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="type-tag">${item.scene}</div>
                            <div class="english">${item.en}</div>
                            <div class="audio-icon" onclick="event.stopPropagation(); speak('${item.en.replace(/'/g, "\\'")}')">
                                <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                            </div>
                        </div>
                        <div class="card-back">
                            <div class="type-tag">Dịch Nghĩa</div>
                            <div class="vietnamese">${item.vi}</div>
                        </div>
                    </div>
                `;

                card.onclick = () => {
                    if (card.classList.contains('active')) {
                        card.classList.toggle('flipped');
                    } else {
                        card.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                    }
                };

                gallery.insertBefore(card, spacerAfter);
                observer.observe(card);
            });

            document.getElementById('card-counter').innerText = `1 / ${currentStoryData.length}`;
            gallery.scrollLeft = 0;
        }

        // XỬ LÝ DI CHUYỂN
        window.moveSlide = (direction) => {
            const cards = document.querySelectorAll('.flashcard');
            const currentActive = document.querySelector('.flashcard.active');
            let nextIndex = 0;
            if (currentActive) nextIndex = parseInt(currentActive.dataset.index) + direction;
            if (nextIndex >= 0 && nextIndex < cards.length) {
                cards[nextIndex].scrollIntoView({ behavior: 'smooth', inline: 'center' });
            }
        };

        // OBSERVER ĐỂ THEO DÕI THẺ ĐANG XEM
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    document.getElementById('card-counter').innerText = `${parseInt(entry.target.dataset.index) + 1} / ${currentStoryData.length}`;
                } else {
                    entry.target.classList.remove('active', 'flipped');
                }
            });
        }, { root: document.getElementById('gallery'), threshold: 0.7 });

        // HIỆU ỨNG SAO BAY (Giữ nguyên của bạn)
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 60; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, opacity: Math.random(), speed: 0.01 });
            }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.opacity += s.speed; if (s.opacity > 1 || s.opacity < 0.2) s.speed = -s.speed;
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.onload = () => {
            initCanvas();
            animate();
            loadVoices();

            // Tự động tạo danh sách bài học từ allStories
            const selector = document.getElementById('story-selector');
            selector.innerHTML = Object.keys(allStories).map(key =>
                `<option value="${key}">${allStories[key].titleEn} (${allStories[key].titleVi})</option>`
            ).join('');

            // SỬA Ở ĐÂY: Thay 'snowWhite' bằng 'televisionUnit7' để khớp với database mới
            loadStory('televisionUnit7');
        };

        window.addEventListener('resize', initCanvas);
    </script>
